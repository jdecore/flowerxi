name: Update Market Prices

on:
  schedule:
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape market prices
        run: python scripts/scrape_market.py --output frontend/public/market_prices.json

      - name: Detect file changes
        id: changes
        run: |
          if git diff --quiet -- frontend/public/market_prices.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/market_prices.json
          git commit -m "chore(data): update market prices"
          git push

